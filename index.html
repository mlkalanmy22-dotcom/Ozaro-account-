<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ozaro | Nixon Cloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0e14;
            --glass: rgba(26, 31, 39, 0.6);
            --primary: #c3427f;
            --accent: #00d4ff;
            --text: #e0e0e0;
            --blur: 25px;
        }
        .light-mode {
            --bg: #f0f2f5;
            --glass: rgba(255, 255, 255, 0.8);
            --primary: #7e1e4f;
            --accent: #008eb3;
            --text: #222;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            transition: 0.5s;
            background-image: radial-gradient(circle at 15% 15%, rgba(195, 66, 127, 0.1), transparent 40%),
                              radial-gradient(circle at 85% 85%, rgba(0, 212, 255, 0.1), transparent 40%);
        }
        body::after {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            backdrop-filter: blur(var(--blur)); z-index: -1;
        }
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; background: var(--glass);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky; top: 0; z-index: 1000;
        }
        .user-profile { display: flex; align-items: center; gap: 12px; }
        .user-profile img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .user-info b { font-size: 14px; color: var(--accent); display: block; }
        .insta-link { color: var(--primary); font-size: 20px; transition: 0.3s; }

        .top-nav { display: flex; gap: 15px; align-items: center; }
        .add-folder-btn { cursor: pointer; font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 5px; color: var(--text); }

        .file-list { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        
        .item-card {
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; text-align: center;
            border-bottom: 3px solid var(--accent); transition: 0.3s; position: relative;
        }
        .item-card i { font-size: 35px; margin-bottom: 10px; }
        .item-card span { font-size: 11px; color: var(--text); }

        .fab-container { position: fixed; bottom: 30px; left: 30px; z-index: 2000; }
        .main-fab {
            width: 60px; height: 60px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #fff, var(--accent));
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; color: #000; cursor: pointer;
            box-shadow: 0 0 20px rgba(0,212,255,0.5);
            transition: 0.4s;
        }
        .fab-container.active .main-fab { transform: rotate(45deg); }
        .sub-options {
            position: absolute; bottom: 75px; left: 5px;
            display: flex; flex-direction: column; gap: 12px;
            pointer-events: none; opacity: 0; transform: translateY(20px); transition: 0.4s;
        }
        .fab-container.active .sub-options { pointer-events: auto; opacity: 1; transform: translateY(0); }
        .opt { width: 48px; height: 48px; border-radius: 50%; background: var(--glass); border: 1px solid var(--accent); display: flex; justify-content: center; align-items: center; color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="user-profile">
            <img src="nixon.webp" alt="Ozaro" onerror="this.src='https://i.imgur.com/Gz7nEaL.png'">
            <div class="user-info">
                <b>ozaro-nixon</b>
                <a href="https://www.instagram.com/ozaro.nixon" class="insta-link" target="_blank"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
        <div class="top-nav">
            <div class="add-folder-btn" onclick="addNewFolder()">
                <i class="fas fa-folder-plus"></i> إضافة مجلد
            </div>
            <div onclick="document.body.classList.toggle('light-mode')" style="cursor:pointer;"><i class="fas fa-moon"></i></div>
        </div>
    </header>

    <div class="file-list" id="displayArea">

        <div class="main-fab" onclick="document.getElementById('fab').classList.toggle('active')">
