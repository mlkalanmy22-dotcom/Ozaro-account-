<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ozaro | Nixon Cloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0e14;
            --glass: rgba(26, 31, 39, 0.6);
            --primary: #c3427f;
            --accent: #00d4ff;
            --text: #e0e0e0;
            --blur: 25px;
        }
        .light-mode {
            --bg: #f0f2f5;
            --glass: rgba(255, 255, 255, 0.8);
            --primary: #7e1e4f;
            --accent: #008eb3;
            --text: #222;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            transition: 0.5s;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(195, 66, 127, 0.15), transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(0, 212, 255, 0.1), transparent 40%);
            backdrop-filter: blur(var(--blur));
            z-index: -1;
        }
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky; top: 0; z-index: 1000;
        }
        .user-profile { display: flex; align-items: center; gap: 12px; }
        .user-profile img { 
            width: 45px; height: 45px; border-radius: 50%; 
            border: 2px solid var(--accent); object-fit: cover;
            box-shadow: 0 0 10px var(--accent);
        }
        .user-info { display: flex; flex-direction: column; }
        .user-info b { font-size: 14px; color: var(--accent); }
        .insta-link { color: var(--primary); text-decoration: none; font-size: 20px; transition: 0.3s; }
        
        .top-actions { display: flex; align-items: center; gap: 15px; }
        .nav-btn { cursor: pointer; font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 5px; }

        .fab-container { position: fixed; bottom: 30px; left: 30px; z-index: 2000; }
        .main-fab {
            width: 60px; height: 60px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #fff, var(--accent));
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; color: #000; cursor: pointer;
            box-shadow: 0 0 20px rgba(0,212,255,0.6);
            transition: 0.4s;
        }
        .fab-container.active .main-fab { transform: rotate(45deg); }
        .sub-options {
            position: absolute; bottom: 75px; left: 5px;
            display: flex; flex-direction: column; gap: 12px;
            pointer-events: none; opacity: 0; transform: translateY(20px);
            transition: 0.4s;
        }
        .fab-container.active .sub-options { pointer-events: auto; opacity: 1; transform: translateY(0); }
        .opt {
            width: 48px; height: 48px; border-radius: 50%;
            background: var(--glass); border: 1px solid var(--accent);
            display: flex; justify-content: center; align-items: center;
            color: var(--accent); cursor: pointer; transition: 0.3s;
        }

        .file-list { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .file-card {
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; text-align: center;
            border-bottom: 3px solid var(--primary); transition: 0.3s; position: relative;
        }
        .file-card i { font-size: 35px; margin-bottom: 10px; color: var(--accent); }
        .file-card span { font-size: 12px; word-break: break-all; }
        .delete-btn { position: absolute; top: 5px; right: 5px; color: #ff4d4d; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="user-profile">
            <img src="nixon.webp" alt="Ozaro" onerror="this.src='https://i.imgur.com/Gz7nEaL.png'">
            <div class="user-info">
                <b>ozaro-nixon</b>
                <a href="https://www.instagram.com/ozaro.nixon" class="insta-link" target="_blank"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
        <div class="top-actions">
            <div class="nav-btn" onclick="document.body.classList.toggle('light-mode')"><i class="fas fa-adjust"></i></div>
        </div>
    </header>

    <div class="file-list" id="fileList"></div>

    <div class="fab-container" id="fab">
        <div class="sub-options">
            <div class="opt" onclick="triggerUpload('video/*')"><i class="fas fa-video"></i></div>
            <div class="opt" onclick="triggerUpload('audio/*')"><i class="fas fa-music"></i></div>
            <div class="opt" onclick="uploadAny()"><i class="fas fa-file-upload"></i></div>
        </div>
        <div class="main-fab" onclick="document.getElementById('fab').classList.toggle('active')">
            <i class="fas fa-plus"></i>
        </div>
    </div>

    <input type="file" id="fileInp" style="display:none">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, listAll, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBLIqV7pAFJc7pgKDLK0512rPW_LRc9xWk",
            authDomain: "ozaro-39a5b.firebaseapp.com",
            projectId: "ozaro-39a5b",
            storageBucket: "ozaro-39a5b.appspot.com",
            messagingSenderId: "247100709167",
            appId: "1:247100709167:web:55a7ae449401a32de829da"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const fileList = document.getElementById('fileList');
        const fileInp = document.getElementById('fileInp');

        async function loadFiles() {
            fileList.innerHTML = '';
            const listRef = ref(storage, 'uploads/');
            const res = await listAll(listRef);
            res.items.forEach(async (item) => {
                const url = await getDownloadURL(item);
                const card = document.createElement('div');
                card.className = 'file-card';
                card.innerHTML = `
                    <i class="fas fa-file-alt" onclick="window.open('${url}')"></i>
                    <span>${item.name}</span>
                    <i class="fas fa-trash delete-btn" onclick="deleteFile('${item.name}')"></i>
                `;
                fileList.appendChild(card);
            });
        }

        window.triggerUpload = (type) => {
            fileInp.accept = type;
            fileInp.click();
        };

        window.uploadAny = () => {
            fileInp.removeAttribute('accept');
            fileInp.click();
        };

        fileInp.onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const sRef = ref(storage, 'uploads/' + file.name);
            await uploadBytes(sRef, file);
            alert("تم الرفع بنجاح!");
            loadFiles();
        };

        window.deleteFile = async (name) => {
            if(confirm("هل تريد حذف الملف؟")) {
                await deleteObject(ref(storage, 'uploads/' + name));
                loadFiles();
            }
        };

        loadFiles();
    </script>
</body>
</html>
