<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ozaro | Nixon Siberian Files</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* نظام "سيبيريا": خلفية غامقة مائلة للأزرق مع لمسات وردية */
            --bg: #0a0e14;
            --container-bg: rgba(26, 31, 39, 0.85);
            --primary: #c3427f; /* وردي غامق للسيبيريا */
            --primary-light: #f7559e;
            --accent: #00d4ff; /* أزرق نيون */
            --text-main: #e0e0e0;
            --text-sub: #888;
            --shadow: 0 10px 30px rgba(0,0,0,0.4);
            --transition: 0.3s ease;
            --blur: 20px;
        }

        /* وضع النهار (إذا احتجته لاحقاً، لكن السيبيريا تبان أفضل في الغامق) */
        .light-mode {
            --bg: #f4f6f8;
            --container-bg: rgba(255, 255, 255, 0.9);
            --primary: #7e1e4f;
            --primary-light: #c3427f;
            --accent: #0093b3;
            --text-main: #333;
            --text-sub: #666;
            --shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 10% 10%, rgba(195, 66, 127, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(0, 212, 255, 0.1) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(10, 14, 20, 0.8) 0px, transparent 80%);
            /* خلفية ضبابية كما طلبت */
            background-attachment: fixed;
            background-size: cover;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 14, 20, 0.3);
            backdrop-filter: blur(var(--blur)); /* الضبابية للحماية من أذى العين */
            z-index: -1;
        }

        .main-container {
            background: var(--container-bg);
            width: 100%;
            max-width: 900px;
            min-height: 80vh;
            border-radius: 25px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* الجزء العلوي: الشريط والشخصية */
        .top-banner {
            background-color: #0d121b;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .profile-pic-container {
            width: 60px; height: 60px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--accent);
            box-shadow: 0 0 10px rgba(0,212,255,0.3);
            transition: var(--transition);
        }
        .profile-pic-container:hover { transform: scale(1.1) rotate(5deg); }

        .profile-pic-container img {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .name-and-insta {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .user-name {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: lowercase; /* لجعل اسمك ozaro-nixon بالحروف الصغيرة */
            color: var(--accent);
        }

        .insta-link {
            color: var(--text-sub);
            text-decoration: none;
            font-size: 13px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .insta-link:hover { color: var(--primary-light); }

        .top-right-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .dark-mode-toggle {
            cursor: pointer;
            color: var(--text-sub);
            transition: var(--transition);
            font-size: 1.2rem;
        }
        .dark-mode-toggle:hover { color: var(--text-main); }

        /* منطقة الملفات والمجلدات */
        .files-area {
            flex: 1;
            padding: 30px;
            position: relative;
        }

        .add-options {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: flex-start;
        }

        .action-btn {
            background: var(--primary);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .action-btn:hover { background: var(--primary-light); transform: translateY(-2px); }
        .action-btn.accent-btn { background: rgba(0, 212, 255, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        .action-btn.accent-btn:hover { background: rgba(0, 212, 255, 0.2); }

        .add-section {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end; /* لجعله يمين فوق كما طلبت */
        }

        .file-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .file-item {
            background: #10151f;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: var(--transition);
            border: 1px solid transparent;
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            border-right: 4px solid var(--primary); /* لون افتراضي سيبيريا */
        }
        .file-item:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.03); }

        .file-icon { font-size: 2.2rem; margin-bottom: 10px; color: var(--primary); }
        .file-name { font-size: 15px; font-weight: 600; color: var(--text-main); margin-bottom: 5px; }
        .file-size { font-size: 11px; color: var(--text-sub); }

        .dots-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            color: var(--text-sub);
            cursor: pointer;
            transition: var(--transition);
        }
        .dots-btn:hover { color: var(--accent); }

        /* زر الإضافة السحري (+) يسار تحت */
        .magic-plus {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 60px; height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent) 0%, rgba(255,255,255,0.8) 100%); /* زرقاء وبها بياض */
            color: #0a0e14;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 5px 20px rgba(0,212,255,0.5);
            z-index: 1000;
        }
        .magic-plus:hover { transform: scale(1.1) rotate(90deg); box-shadow: 0 8px 25px rgba(0,212,255,0.7); }

    </style>
</head>
<body>

    <div class="main-container">
        
        <header class="top-banner">
            <div class="user-info">
                <div class="profile-pic-container">
                    <img src="https://static.wikia.nocookie.net/bleach/images/6/64/Sōsuke_Aizen_profile.png" alt="Ozaro Nixon">
                </div>
                <div class="name-and-insta">
                    <span class="user-name">ozaro-nixon</span>
                    <a href="https://www.instagram.com/ozaro.nixon" target="_blank" class="insta-link">
                        <i class="fab fa-instagram">
                    </a>
                </div>
            </div>
            
            <div class="top-right-section">
                <div class="dark-mode-toggle" id="darkModeToggle">
                    <i class="fas fa-moon" id="toggleIcon">
                </div>
            </div>
        </header>

        <main class="files-area">
            
            <div class="add-section">
                <button class="action-btn" id="addFolderBtn">
                    <i class="fas fa-folder-plus">
                </button>
            </div>

            <div class="file-list">
                
                <div class="file-item" style="border-right: 4px solid var(--primary);">
                    <i class="dots-btn fas fa-ellipsis-v">
                    <i class="file-icon fas fa-file-video">
                    <span class="file-name">Nixon Siberia Intro.mp4</span>
                    <span class="file-size">45 MB</span>
                </div>

                <div class="file-item" style="border-right: 4px solid var(--accent);">
                    <i class="dots-btn fas fa-ellipsis-v">
                    <i class="file-icon fas fa-music">
                    <span class="file-name">Synthwave Siberia.mp3</span>
                    <span class="file-size">8 MB</span>
                </div>

            </div>

        </div>

        <div class="magic-plus">
            <i class="fas fa-plus">
        </div>

    </div>

    <script>
        const body = document.body;
        const toggleIcon = document.getElementById('toggleIcon');
        const toggleBtn = document.getElementById('darkModeToggle');

        // الوضع الليلي افتراضي للسيبيريا
        body.classList.add('dark-mode'); 

        toggleBtn.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            if (body.classList.contains('light-mode')) {
                toggleIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                toggleIcon.classList.replace('fa-sun', 'fa-moon');
            }
        });
    </script>
</body>
</html>
