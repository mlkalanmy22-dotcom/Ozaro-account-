<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nixon Cloud | مخزن أوزارو</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0a0a; --card: #151515; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .upload-section { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #333; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--primary); letter-spacing: 2px; text-transform: uppercase; }
        input[type="file"] { display: none; }
        .custom-btn { background: var(--primary); color: black; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; display: inline-block; margin-top: 15px; transition: 0.3s; }
        .custom-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        #status { margin-top: 15px; font-size: 14px; color: #888; }
        .file-list { width: 100%; max-width: 500px; margin-top: 40px; }
        .file-item { background: var(--card); padding: 15px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid var(--primary); }
        .download-link { color: var(--primary); text-decoration: none; font-weight: bold; border: 1px solid var(--primary); padding: 5px 10px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <h1>Nixon Cloud</h1>
    <p style="color: #666;">ارفع ملحقاتك وستبقى للأبد</p>

    <div class="upload-section">
        <label for="fileInput" class="custom-btn">اختر ملف للرفع</label>
        <input type="file" id="fileInput">
        <div id="status">جاهز للرفع...</div>
    </div>

    <div class="file-list" id="fileList">
        <h3>الملفات المرفوعة:</h3>
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, listAll } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // الـ Config الخاص بك من الصورة
        const firebaseConfig = {
            apiKey: "AIzaSyBLIqV7pAFJc7pgKDLK0512rPW_LRc9xWk",
            authDomain: "ozaro-39a5b.firebaseapp.com",
            projectId: "ozaro-39a5b",
            storageBucket: "ozaro-39a5b.appspot.com",
            messagingSenderId: "247100709167",
            appId: "1:247100709167:web:55a7ae449401a32de829da",
            measurementId: "G-277TCP5Q83"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const fileListDiv = document.getElementById('fileList');

        // دالة لعرض الملفات
        async function loadFiles() {
            fileListDiv.innerHTML = '<h3>الملفات المرفوعة:</h3>';
            const listRef = ref(storage, 'uploads/');
            const res = await listAll(listRef);
            for (const item of res.items) {
                const url = await getDownloadURL(item);
                fileListDiv.innerHTML += `
                    <div class="file-item">
                        <span>${item.name}</span>
                        <a href="${url}" target="_blank" class="download-link">تحميل</a>
                    </div>`;
            }
        }

        // رفع الملف
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const storageRef = ref(storage, 'uploads/' + file.name);
            status.innerText = "جاري الرفع... انتظر قليلاً";
            
            uploadBytes(storageRef, file).then(() => {
                status.innerText = "تم الرفع بنجاح! حدث الصفحة";
                loadFiles();
            }).catch(error => {
                status.innerText = "خطأ: تأكد من تفعيل Storage Rules";
                console.error(error);
            });
        });

        loadFiles();
    </script>
</body>
</html>
