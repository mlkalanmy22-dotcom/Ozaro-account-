
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ozaro | Nixon Cloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0e14;
            --glass: rgba(26, 31, 39, 0.7);
            --primary: #c3427f;
            --accent: #00d4ff;
            --text: #e0e0e0;
            --blur: 15px;
        }

        .light-mode {
            --bg: #eef2f7;
            --glass: rgba(255, 255, 255, 0.8);
            --primary: #7e1e4f;
            --accent: #008eb3;
            --text: #222;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            min-height: 100vh;
            transition: 0.5s;
            overflow: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(195, 66, 127, 0.1) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 40%);
        }

        /* الطبقة الضبابية لمنع إجهاد العين */
        body::after {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            backdrop-filter: blur(var(--blur)); z-index: -1;
        }

        /* الشريط العلوي */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; background: var(--glass);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .user-profile { display: flex; align-items: center; gap: 12px; }
        .user-profile img { 
            width: 50px; height: 50px; border-radius: 50%; 
            border: 2px solid var(--accent); object-fit: cover;
        }
        .user-name-box { display: flex; flex-direction: column; }
        .user-name-box b { font-size: 16px; color: var(--accent); }
        .insta-btn { color: var(--primary); text-decoration: none; font-size: 18px; transition: 0.3s; }
        .insta-btn:hover { color: #ff00ff; transform: scale(1.2); }

        .top-nav { display: flex; align-items: center; gap: 20px; }
        .nav-item { cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.3s; }
        .nav-item:hover { color: var(--accent); }

        /* الأيقونة العائمة (+) والأنيميشن */
        .fab-container { position: fixed; bottom: 30px; left: 30px; z-index: 1000; }
        .main-fab {
            width: 65px; height: 65px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, var(--accent));
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; color: #000; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,212,255,0.4);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .fab-container.active .main-fab { transform: rotate(45deg); }

        .sub-options {
            position: absolute; bottom: 80px; left: 5px;
            display: flex; flex-direction: column; gap: 15px;
            pointer-events: none; opacity: 0; transform: translateY(20px);
            transition: 0.4s;
        }
        .fab-container.active .sub-options { pointer-events: auto; opacity: 1; transform: translateY(0); }

        .opt-btn {
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--glass); border: 1px solid var(--accent);
            display: flex; justify-content: center; align-items: center;
            color: var(--accent); cursor: pointer; transition: 0.3s;
            position: relative;
        }
        .opt-btn:hover { background: var(--accent); color: #000; }
        .opt-btn span { position: absolute; right: -70px; font-size: 12px; font-weight: bold; color: var(--text); }

        /* وضع الليل والنهار */
        .mode-toggle { cursor: pointer; font-size: 20px; color: var(--text); }

    </style>
</head>
<body>

    <header>
        <div class="user-profile">
            <img src="https://i.imgur.com/Gz7nEaL.png" alt="Ozaro">
            <div class="user-name-box">
                <b>ozaro-nixon</b>
                <a href="https://www.instagram.com/ozaro.nixon" class="insta-btn" target="_blank">
                    <i class="fab fa-instagram"></i>
                </a>
            </div>
        </div>

        <div class="top-nav">
            <div class="nav-item" onclick="addFolder()">
                <i class="fas fa-folder-plus"></i> إضافة مجلد
            </div>
            <div class="mode-toggle" id="modeToggle">
                <i class="fas fa-moon"></i>
            </div>
        </div>
    </header>

    <div class="fab-container" id="fabContainer">
        <div class="sub-options">
            <div class="opt-btn" onclick="triggerFile('video/*')">
                <i class="fas fa-video"></i><span>فيديو</span>
            </div>
            <div class="opt-btn" onclick="triggerFile('audio/*')">
                <i class="fas fa-music"></i><span>موسيقى</span>
            </div>
            <div class="opt-btn" onclick="triggerFile('image/*')">
                <i class="fas fa-image"></i><span>صور</span>
            </div>
        </div>
        <div class="main-fab" onclick="toggleFab()">
            <i class="fas fa-plus"></i>
        </div>
    </div>

    <input type="file" id="realInput" style="display:none">

    <script>
        // تفعيل القائمة المنبثقة للـ +
        function toggleFab() {
            document.getElementById('fabContainer').classList.toggle('active');
        }

        // اختيار الملف حسب النوع
        function triggerFile(type) {
            const input = document.getElementById('realInput');
            input.accept = type;
            input.click();
            toggleFab();
        }

        // وضع الليل والنهار
        const modeToggle = document.getElementById('modeToggle');
        modeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const icon = modeToggle.querySelector('i');
            if(document.body.classList.contains('light-mode')) {
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        });

        // إضافة مجلد (تنبيه تجريبي حالياً)
        function addFolder() {
            const name = prompt("أدخل اسم المجلد الجديد:");
            const color = prompt("أدخل لون المجلد (hex مثل #ff0000):", "#00d4ff");
            if(name) alert("سيتم إنشاء مجلد باسم: " + name + " بلون: " + color);
        }
    </script>
</body>
</html>
