<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZARO/NIXON</title>
    <style>
        :root { --text: #00d4ff; --bg: #000; --overlay: rgba(0,0,0,0.85); }
        .light { --text: #007bff; --bg: #fff; --overlay: rgba(255,255,255,0.8); }
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: "Times New Roman", serif; color: var(--text); background: var(--bg); overflow: hidden; transition: 0.5s; }
        .bg-img { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1542281286-9e0a16bb7366?w=1000') center/cover; opacity: 0.2; z-index: -2; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay); z-index: -1; }
        h1 { font-size: clamp(1.2rem, 8vw, 2.5rem); letter-spacing: 3px; text-shadow: 0 0 10px var(--text); margin: 0; }
        .sub { font-size: 0.7rem; letter-spacing: 4px; color: #aaa; margin-top: 10px; }
        .mode-btn { position: fixed; top: 20px; left: 20px; font-size: 24px; cursor: pointer; z-index: 100; }
        .menu-btn { position: fixed; top: 20px; right: 20px; font-size: 24px; cursor: pointer; z-index: 100; }
        .upload-btn { position: fixed; bottom: 30px; left: 30px; width: 50px; height: 50px; border: 1px solid var(--text); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; z-index: 100; }
        .sidebar { position: fixed; right: -250px; top: 0; width: 200px; height: 100%; background: rgba(0,0,0,0.9); transition: 0.4s; padding: 60px 20px; z-index: 99; border-left: 1px solid var(--text); }
        .sidebar.active { right: 0; }
        .light .sidebar { background: rgba(255,255,255,0.9); }
    </style>
</head>
<body>
    <div class="bg-img"></div><div class="overlay"></div>
    <div class="mode-btn" onclick="document.body.classList.toggle('light'); this.innerText = document.body.classList.contains('light') ? '☀️' : '🌙'">🌙</div>
    <div class="menu-btn" onclick="document.getElementById('side').classList.toggle('active')">☰</div>
    <div class="upload-btn" onclick="document.getElementById('f').click()">+</div>
    <input type="file" id="f" hidden>
    <div class="sidebar" id="side">
        <a href="https://instagram.com/YOUR_INSTA" style="color:var(--text); text-decoration:none;">INSTAGRAM</a>
    </div>
    <div style="text-align:center;">
        <h1>OZARO/NIXON</h1>
        <div class="sub">AM EDITOR</div>
    </div>
</body>
</html>
